{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Steve Cabs — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h2>STEVE CABS</h2>
        <p style="text-align:center;color:#aaa;font-size:.9rem;margin-bottom:12px;">
            Riders, drivers, and staff all sign in here.<br>
            <span style="color:#dc143c;">Staff</span> accounts use the admin dashboard after login.
        </p>
        <form method="post" action="">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required autocomplete="username">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <button type="submit">Login</button>
        </form>
        <a href="/accounts/register/">Create account</a>
        <div style="text-align:center;margin-top:16px;font-size:.85rem;">
            <a href="{% url 'rides:landing' %}" style="color:#dc143c;">← Home</a>
        </div>
    </div>
</body>
</html>
